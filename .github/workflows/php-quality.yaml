name: PHP Quality Checks (changed files)

on:
  pull_request:
    paths:
      - '**/*.php'

jobs:
  php-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (fetch all history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Composer vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Setup PHP (composer + tools)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer,phpcs,phplint

      - name: Install Composer dependencies (including PHPCompatibility)
        run: |
          composer config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer require --dev phpcompatibility/php-compatibility:^10.0.0@dev || true
          composer install --no-interaction --no-scripts --prefer-dist

      - name: Determine changed PHP files
        id: changed
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}

          # fetch everything (avoids "couldn't find remote ref")
          git fetch origin --no-tags --prune +refs/heads/*:refs/remotes/origin/* || true
          git fetch origin $HEAD_SHA || true
          git fetch origin $BASE_SHA || true

          # list added/modified PHP files between base..head (ignore deletions)
          FILES=$(git diff --name-only --diff-filter=AM $BASE_SHA $HEAD_SHA -- '*.php' || true)

          if [ -z "$FILES" ]; then
            echo "files=" >> $GITHUB_OUTPUT
          else
            echo "files=$(echo $FILES | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Run PHPLint on changed files
        if: steps.changed.outputs.files != ''
        run: |
          echo "Running phplint on: ${{ steps.changed.outputs.files }}"
          set -e
          phplint ${{ steps.changed.outputs.files }}

      - name: Run PHPCS on changed files
        if: steps.changed.outputs.files != ''
        run: |
          echo "Running phpcs on: ${{ steps.changed.outputs.files }}"
          phpcs -p --extensions=php ${{ steps.changed.outputs.files }}

      - name: Run PHPCompatibility (phpcs standard) on changed files
        if: steps.changed.outputs.files != ''
        run: |
          echo "Running PHPCompatibility on: ${{ steps.changed.outputs.files }}"
          vendor/bin/phpcs -p --standard=PHPCompatibility --runtime-set testVersion 8.1- --extensions=php ${{ steps.changed.outputs.files }}
